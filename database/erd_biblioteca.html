
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram

  USUARIOS {
    int id PK
    string nome
    string email
    string senha_hash
    string cpf
    string telefone
    date data_nascimento
    string estado
    string cep
    enum perfil "admin, cliente"
    boolean ativo
    timestamp criado_em
  }

  LIVROS {
    int id PK
    string titulo
    string autor
    enum categoria "Terror, Drama, Romance, Suspense, Comedia, Fantasia, Ficcao_Cientifica, Aventura, Biografia, Historia, Autoajuda, Outros"
    date data_publicacao
    int quantidade_estoque
    string resumo
    string capa_url
    decimal preco_locacao
    tinyint status "1=disponivel 0=indisponivel"
    timestamp criado_em
  }

  EXEMPLARES {
    int id PK
    int livro_id FK
    string codigo
    tinyint status "1=disponivel 0=indisponivel"
    timestamp criado_em
  }

  EMPRESTIMOS {
    int id PK
    int usuario_id FK
    int exemplar_id FK
    string nome_locatario
    string cpf_locatario
    string contato_locatario
    date data_retirada
    date data_devolucao_prevista
    date data_devolucao_real
    enum status "ativo, devolvido, atrasado"
    timestamp criado_em
  }

  RESERVAS {
    int id PK
    int usuario_id FK
    int livro_id FK
    date data_reserva
    date data_expiracao
    enum status "pendente, confirmada, cancelada, expirada"
    timestamp criado_em
  }

  MULTAS {
    int id PK
    int emprestimo_id FK
    int dias_atraso
    decimal valor_por_dia
    decimal valor_total
    enum status "pendente, paga"
    timestamp criado_em
  }

  MOVIMENTACOES {
    int id PK
    int usuario_id FK
    enum tipo "login, emprestimo, devolucao, reserva, cadastro_livro, cancelamento, multa"
    string descricao
    int referencia_id "id do registro relacionado"
    string referencia_tipo "emprestimos, reservas, livros"
    string mes "Jan, Fev, Mar..."
    int ano
    timestamp criado_em
  }

  USUARIOS ||--o{ EMPRESTIMOS : realiza
  USUARIOS ||--o{ RESERVAS : faz
  USUARIOS ||--o{ MOVIMENTACOES : gera
  LIVROS ||--|{ EXEMPLARES : possui
  LIVROS ||--o{ RESERVAS : recebe
  EXEMPLARES ||--o{ EMPRESTIMOS : envolvido_em
  EMPRESTIMOS ||--o| MULTAS : gera
  EMPRESTIMOS ||--o{ MOVIMENTACOES : registrada_em
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
