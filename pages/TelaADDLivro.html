<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Livro - Biblioteca</title>
    <link rel="stylesheet" href="../styles/navbar.css">
    <link rel="stylesheet" href="../styles/footer.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/TelaADDLivro.css">
    <style>
        .add-page { margin-left:0 !important; max-width:none !important; margin-top:0 !important; padding:52px 56px 80px !important; }
        .add-page-header { margin-bottom:36px; }
        .layout { display:flex; min-height:100vh; padding-top:70px; }
        .sidebar {
            width:230px;
            background: linear-gradient(
                180deg,
                rgba(27, 38, 136, 0.55) 0%,
                rgba(6,  11,  48, 0.70) 100%
            ) !important;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-right: 1px solid rgba(112, 163, 240, 0.18) !important;
            padding:36px 0; flex-shrink:0; display:flex; flex-direction:column; gap:2px; position:sticky; top:70px; height:calc(100vh - 70px);
        }
        .sidebar-item { display:flex; align-items:center; gap:12px; padding:13px 24px; font-size:12px; font-weight:500; letter-spacing:0.8px; text-transform:uppercase; color:rgba(232,236,244,0.5) !important; text-decoration:none; margin-right:12px; border-radius:0 6px 6px 0; border-left:2px solid transparent; transition:color 0.2s,background 0.2s,border-color 0.2s; }
        .sidebar-item:hover { background:rgba(112,163,240,0.12) !important; color:rgba(232,236,244,0.9) !important; border-left-color: rgba(112,163,240,0.3) !important; }
        .sidebar-item.active { background:rgba(112,163,240,0.15) !important; border-left-color:#70a3f0 !important; color:#e8ecf4 !important; }
        .sidebar-item i { width:16px; text-align:center; font-size:14px; color:#70a3f0 !important; opacity:0.75; transition:opacity 0.2s; }
        .sidebar-item:hover i, .sidebar-item.active i { opacity:1; }
        .admin-only { display:none; }
        .dev-only   { display:none; }
        .main { flex:1; min-width:0; overflow:hidden; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo-left"><img src="../img/logo_removebg.png" alt="Digital Library" class="logo-img"></div>
            <nav class="nav-menu">
                <a href="../pages/TelaHome.html" class="nav-link">INÍCIO</a>
                <a href="../pages/TelaHome.html#sessao-sobre" class="nav-link">SOBRE</a>
                <a href="../pages/TelaCatalogoLivros.html" class="nav-link">CATÁLOGO</a>
                <a href="../pages/TelaHome.html#sessao-contato" class="nav-link">CONTATO</a>
            </nav>
            <div class="nav-user-area" id="navUserArea"></div>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <a href="../pages/dashboard.html" class="sidebar-item admin-only">
                <i class="fa-solid fa-house"></i><span>Dashboard</span>
            </a>
            <a href="../pages/TelaADDLivro.html" class="sidebar-item admin-only active">
                <i class="fa-solid fa-book-medical"></i><span>Adicionar Livro</span>
            </a>
            <a href="../pages/TelaGestaoUsuarios.html" class="sidebar-item admin-only">
                <i class="fa-solid fa-users-gear"></i><span>Gestão de Usuários</span>
            </a>
            <a href="../pages/TelaCatalogoLivros.html" class="sidebar-item">
                <i class="fa-solid fa-book-open"></i><span>Catálogo</span>
            </a>
            <a href="../pages/TelaUsuariologado.html" class="sidebar-item">
                <i class="fa-solid fa-user"></i><span>Meu Perfil</span>
            </a>
            <a href="../pages/TelaSqlConsole.html" class="sidebar-item dev-only">
                <i class="fa-solid fa-tower-observation"></i><span>Torre de Consultas</span>
            </a>
        </aside>

        <main class="main">
            <div class="add-page">
                <div class="add-page-header">
                    <div>
                        <span class="add-page-sup">Acervo Digital</span>
                        <h1>Adicionar Novo Livro</h1>
                    </div>
                </div>
                <div class="form-card">
                    <div class="form-top">
                        <div class="cover-upload-area" id="coverArea" title="Clique para escolher a capa">
                            <input type="file" id="inputCapa" accept="image/jpeg,image/png,image/webp">
                            <img class="cover-preview" id="capaPreview" alt="Preview da capa">
                            <div class="cover-placeholder" id="capaPlaceholder">
                                <i class="fa-regular fa-image"></i>
                                <span>Clique para adicionar a capa do livro</span>
                                <small>JPG, PNG, WEBP — Máx. 5 MB</small>
                            </div>
                            <span class="cover-label" id="capaLabel">Foto da capa</span>
                        </div>
                        <div class="form-fields">
                            <div class="form-group">
                                <label for="inputTitulo">Título <span class="required">*</span></label>
                                <input type="text" id="inputTitulo" placeholder="Ex: Dom Quixote" maxlength="120">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="inputAutor">Autor <span class="required">*</span></label>
                                    <input type="text" id="inputAutor" placeholder="Ex: Miguel de Cervantes" maxlength="80">
                                </div>
                                <div class="form-group">
                                    <label for="inputCategoria">Categoria <span class="required">*</span></label>
                                    <select id="inputCategoria">
                                        <option value="">Selecione uma categoria</option>
                                        <option value="Terror">Terror</option>
                                        <option value="Drama">Drama</option>
                                        <option value="Romance">Romance</option>
                                        <option value="Suspense">Suspense</option>
                                        <option value="Comédia">Comédia</option>
                                        <option value="Fantasia">Fantasia</option>
                                        <option value="Ficção Científica">Ficção Científica</option>
                                        <option value="Aventura">Aventura</option>
                                        <option value="Biografia">Biografia</option>
                                        <option value="História">História</option>
                                        <option value="Autoajuda">Autoajuda</option>
                                        <option value="Mistério">Mistério</option>
                                        <option value="Outros">Outros</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="inputDataPublicacao">Data de Publicação <span class="required">*</span></label>
                                    <input type="date" id="inputDataPublicacao">
                                </div>
                                <div class="form-group">
                                    <label for="inputQuantidade">Quantidade em Estoque <span class="required">*</span></label>
                                    <input type="number" id="inputQuantidade" min="1" max="9999" placeholder="Ex: 3">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="inputPreco">Preço do Aluguel (R$) <span class="required">*</span></label>
                                    <div style="position:relative;">
                                        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.35);font-size:13px;pointer-events:none;">R$</span>
                                        <input type="number" id="inputPreco" min="0" step="0.01" placeholder="10,00" style="padding-left:36px;">
                                    </div>
                                </div>
                                <div class="form-group" style="visibility:hidden;"></div>
                            </div>
                            <div class="form-group">
                                <label for="inputResumo">Resumo <span class="required">*</span></label>
                                <textarea id="inputResumo" placeholder="Escreva uma sinopse do livro..." maxlength="600"></textarea>
                                <span class="char-count" id="charCount">0 / 600</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-footer">
                        <a class="btn-cancelar" href="../pages/dashboard.html">
                            <i class="fa-solid fa-xmark"></i> Cancelar
                        </a>
                        <button class="btn-salvar" id="btnSalvar">
                            <i class="fa-solid fa-floppy-disk"></i> Salvar Livro
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-add">
        <i class="fa-solid fa-circle-check" id="toast-icon"></i>
        <span id="toast-msg"></span>
    </div>
    <div id="footer"></div>

    <script src="../scripts/navbar.js"></script>
    <script>initNavbar();</script>
    <script src="../scripts/include.js"></script>
    <script>
    const API = '/BibliotecaSA/backend';
    let toastTimer = null;

    (async () => {
        try {
            const resp = await fetch(`${API}/sessao.php`, { credentials: 'same-origin' });
            const data = await resp.json();
            if (!data.logado || (data.perfil !== 'admin' && data.perfil !== 'desenvolvedor')) {
                window.location.href = '/BibliotecaSA/pages/TelaLogin.html';
                return;
            }
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
            if (data.perfil === 'desenvolvedor') {
                document.querySelectorAll('.dev-only').forEach(el => el.style.display = 'flex');
            }
        } catch {
            window.location.href = '/BibliotecaSA/pages/TelaLogin.html';
        }
    })();

    const inputCapa       = document.getElementById('inputCapa');
    const capaPreview     = document.getElementById('capaPreview');
    const capaPlaceholder = document.getElementById('capaPlaceholder');
    const coverArea       = document.getElementById('coverArea');
    coverArea.addEventListener('click', () => inputCapa.click());
    inputCapa.addEventListener('change', () => {
        const file = inputCapa.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { mostrarToast('A imagem deve ter no máximo 5 MB.', true); inputCapa.value = ''; return; }
        const reader = new FileReader();
        reader.onload = e => { capaPreview.src = e.target.result; capaPreview.style.display = 'block'; capaPlaceholder.style.display = 'none'; };
        reader.readAsDataURL(file);
    });

    const inputResumo = document.getElementById('inputResumo');
    const charCount   = document.getElementById('charCount');
    inputResumo.addEventListener('input', () => { charCount.textContent = `${inputResumo.value.length} / 600`; });

    document.getElementById('btnSalvar').addEventListener('click', async () => {
        const titulo    = document.getElementById('inputTitulo').value.trim();
        const autor     = document.getElementById('inputAutor').value.trim();
        const categoria = document.getElementById('inputCategoria').value;
        const data      = document.getElementById('inputDataPublicacao').value;
        const qtd       = document.getElementById('inputQuantidade').value;
        const resumo    = inputResumo.value.trim();
        const preco     = document.getElementById('inputPreco').value;

        if (!titulo)    { mostrarToast('Informe o título do livro.', true); return; }
        if (!autor)     { mostrarToast('Informe o autor do livro.', true); return; }
        if (!categoria) { mostrarToast('Selecione uma categoria.', true); return; }
        if (!data)      { mostrarToast('Informe a data de publicação.', true); return; }
        if (!qtd || parseInt(qtd) < 1) { mostrarToast('Quantidade deve ser no mínimo 1.', true); return; }
        if (preco === '' || parseFloat(preco) < 0) { mostrarToast('Informe um preço de aluguel válido (mínimo R$ 0,00).', true); return; }
        if (!resumo) { mostrarToast('Escreva um resumo do livro.', true); return; }

        const btn  = document.getElementById('btnSalvar');
        const orig = btn.innerHTML;
        btn.disabled  = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Salvando...';

        const fd = new FormData();
        fd.append('titulo', titulo); fd.append('autor', autor); fd.append('categoria', categoria);
        fd.append('data_publicacao', data); fd.append('quantidade', qtd);
        fd.append('preco_aluguel', preco !== '' ? preco : '10.00'); fd.append('resumo', resumo);
        if (inputCapa.files[0]) fd.append('capa', inputCapa.files[0]);

        try {
            const res   = await fetch(`${API}/livros_salvar.php`, { method: 'POST', credentials: 'same-origin', body: fd });
            const data2 = await res.json();
            if (data2.sucesso) {
                mostrarToast('Livro salvo com sucesso! Redirecionando...', false);
                setTimeout(() => window.location.href = '/BibliotecaSA/pages/TelaCatalogoLivros.html', 2000);
            } else {
                btn.disabled = false; btn.innerHTML = orig;
                mostrarToast(data2.erro || 'Erro ao salvar o livro.', true);
            }
        } catch {
            btn.disabled = false; btn.innerHTML = orig;
            mostrarToast('Falha ao conectar ao servidor.', true);
        }
    });

    function mostrarToast(msg, erro = false) {
        clearTimeout(toastTimer);
        const toast = document.getElementById('toast-add');
        const icon  = document.getElementById('toast-icon');
        const msgEl = document.getElementById('toast-msg');
        msgEl.textContent       = msg;
        icon.className          = erro ? 'fa-solid fa-circle-xmark' : 'fa-solid fa-circle-check';
        toast.style.borderColor = erro ? 'rgba(226,75,74,0.4)' : 'rgba(29,158,117,0.4)';
        icon.style.color        = erro ? '#e24b4a' : '#1d9e75';
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
    }
    </script>
</body>
</html>
