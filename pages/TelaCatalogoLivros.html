<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/navbar.css">
  <link rel="stylesheet" href="../styles/footer.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Catálogo de Livros - Biblioteca</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #16181c; color: #e8e4de; font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* ── Layout principal: nav-sidebar + conteúdo ── */
    .page-wrapper {
      display: flex;
      min-height: 100vh;
      padding-top: 70px; /* altura do header */
    }

    /* ── Nav sidebar (navegação entre páginas) ── */
    .nav-sidebar {
      width: 230px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.015);
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 36px 0;
      position: fixed;
      top: 70px;
      left: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 100;
    }

    /* Itens visíveis somente para admin — ocultados por JS se não for admin */
    .nav-sidebar .admin-only { display: none; }

    .nav-sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      text-decoration: none;
      margin-right: 12px;
      border-radius: 0 4px 4px 0;
      border-left: 2px solid transparent;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    .nav-sidebar-item:hover {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.7);
    }
    .nav-sidebar-item.active {
      background: rgba(100,160,255,0.08);
      border-left-color: #7aadff;
      color: #7aadff;
    }
    .nav-sidebar-item i { width: 16px; text-align: center; font-size: 14px; }

    /* ── Conteúdo principal (deslocado pelo nav-sidebar) ── */
    .main-layout {
      margin-left: 230px;
      display: flex;
      width: 100%;
      padding: 68px 48px 100px 48px;
      gap: 40px;
      align-items: flex-start;
    }

    /* ── Filter sidebar (direita) ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: sticky;
      top: 88px;
      align-self: flex-start;
    }

    .filter-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      padding: 20px;
      max-height: 200px;
      overflow-y: auto;
      transition: border-color 0.25s ease;
    }

    .filter-card:hover { border-color: rgba(29,158,117,0.2); }
    .filter-card::-webkit-scrollbar { width: 4px; }
    .filter-card::-webkit-scrollbar-track { background: transparent; }
    .filter-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .filter-title {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(29,158,117,0.9);
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      background: #1c1e23;
      padding-bottom: 4px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: color 0.2s;
    }
    .option:hover { color: rgba(255,255,255,0.9); }
    .option input[type="checkbox"] {
      appearance: none;
      width: 14px; height: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 2px;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }
    .option input[type="checkbox"]:checked { background: #1d9e75; border-color: #1d9e75; }

    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      color: #e8e4de;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .search-input:focus { border-color: rgba(29,158,117,0.5); }
    .search-input::placeholder { color: rgba(255,255,255,0.2); }

    .btn-clear {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.3);
      padding: 10px;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.25s, color 0.25s;
    }
    .btn-clear:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }

    /* ── Catálogo ── */
    .catalog-section { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 40px; }

    /* ── Cabeçalho da página ── */
    .page-header { width: 100%; margin-bottom: 8px; }
    .page-sup {
        display: block; font-size: 10px; font-weight: 500;
        letter-spacing: 4px; text-transform: uppercase; color: #7aadff; margin-bottom: 8px;
    }
    .page-header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 38px; font-weight: 400; color: #fff; margin-bottom: 6px;
    }
    .page-desc { font-size: 13px; color: rgba(255,255,255,0.35); font-weight: 300; }

    .results-info { width: 100%; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.25); }
    .results-info span { color: #1d9e75; }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; width: 100%; }

    .book-card { display: flex; flex-direction: column; cursor: pointer; transition: transform 0.2s ease; }
    .book-card:hover { transform: translateY(-4px); }

    .book-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 3px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
      margin-bottom: 12px;
      display: block;
    }

    .book-card h4 {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 400;
      color: #ffffff;
      line-height: 1.3;
      margin-bottom: 4px;
      height: 34px;
      overflow: hidden;
    }

    .book-card p { font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.35); margin-bottom: 12px; letter-spacing: 0.3px; }

    .book-badge {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      display: inline-block;
      margin-bottom: 8px;
      width: fit-content;
    }
    .badge-disponivel { background: rgba(29,158,117,0.12); color: #5dcaa5; }
    .badge-indisponivel { background: rgba(226,75,74,0.12); color: #e24b4a; }

    .btn-reserve {
      background: transparent;
      color: #1d9e75;
      border: 1px solid rgba(29,158,117,0.4);
      padding: 8px 0;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: auto;
      transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
      width: 100%;
    }
    .btn-reserve:hover { background: #1d9e75; border-color: #1d9e75; color: #fff; }
    .btn-reserve:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-ver-mais {
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 8px 0;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      margin-top: 6px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ver-mais:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }

    /* Loading skeleton */
    .skeleton-card { display: flex; flex-direction: column; gap: 10px; }
    .skeleton-img { width: 100%; aspect-ratio: 2/3; border-radius: 3px; background: linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .skeleton-line { height: 12px; border-radius: 2px; background: linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .skeleton-line.short { width: 60%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .empty-state { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 60px 0; color: rgba(255,255,255,0.2); width: 100%; }
    .empty-state i { font-size: 36px; }
    .empty-state p { font-size: 13px; letter-spacing: 1px; }

    /* Paginação */
    .pagination { display: flex; align-items: center; gap: 6px; }
    .page { background: transparent; border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); padding: 8px 14px; border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: border-color 0.25s ease, color 0.25s ease, background 0.25s ease; }
    .page:hover { border-color: rgba(29,158,117,0.4); color: rgba(255,255,255,0.8); }
    .page.active { border-color: #1d9e75; color: #1d9e75; background: rgba(29,158,117,0.06); }
    .page-dots { color: rgba(255,255,255,0.2); font-size: 12px; padding: 0 4px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 40px; right: 40px;
      display: flex; align-items: center; gap: 16px;
      background: #111316; border: 1px solid rgba(29,158,117,0.4);
      border-radius: 4px; padding: 20px 28px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      z-index: 9999; opacity: 0; transform: translateY(16px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none; min-width: 300px;
    }
    .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast.toast-erro { border-color: rgba(226,75,74,0.4); }
    .toast-icon { width: 36px; height: 36px; border-radius: 50%; background: rgba(29,158,117,0.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .toast-erro .toast-icon { background: rgba(226,75,74,0.12); }
    .toast-icon i { color: #1d9e75; font-size: 15px; }
    .toast-erro .toast-icon i { color: #e24b4a; }
    .toast-body { display: flex; flex-direction: column; gap: 3px; }
    .toast-title { font-family: 'Playfair Display', serif; font-size: 15px; color: #fff; }
    .toast-sub { font-size: 12px; color: rgba(255,255,255,0.4); }
    .toast-close { margin-left: auto; background: none; border: none; color: rgba(255,255,255,0.25); font-size: 13px; cursor: pointer; }
    .toast-close:hover { color: rgba(255,255,255,0.6); }
    .toast-progress { position: absolute; bottom: 0; left: 0; height: 2px; background: #1d9e75; border-radius: 0 0 0 4px; width: 100%; transform-origin: left; }
    .toast.show .toast-progress { animation: progressBar 3s linear forwards; }
    .toast-erro .toast-progress { background: #e24b4a; }
    @keyframes progressBar { from { transform: scaleX(1); } to { transform: scaleX(0); } }
  </style>
</head>
<body>

  <!-- ===== NAVBAR INLINE ===== -->
  <header class="header">

  <script>
  // ============================================================
  //  TelaCatalogoLivros — integrado com banco via livros_listar.php
  // ============================================================
  const API_BASE    = '/BibliotecaSA/backend';
  const POR_PAGINA  = 12;

  let todosLivros     = [];
  let livrosFiltrados = [];
  let paginaAtual     = 1;
  let toastTimer      = null;
  let buscaTimer      = null;

  const grid        = document.getElementById('grid');
  const emptyState  = document.getElementById('emptyState');
  const countEl     = document.getElementById('resultsCount');
  const paginacao   = document.getElementById('pagination');
  const inputBusca  = document.getElementById('inputBusca');
  const btnLimpar   = document.getElementById('btnLimpar');
  const filtrosCats = document.getElementById('filtrosCategorias');
  const filtrosAuts = document.getElementById('filtrosAutores');
  const toast       = document.getElementById('toast');

  // ── Detecta sessão e exibe/configura o nav sidebar ──
  (async () => {
    try {
      const resp   = await fetch(`${API_BASE}/sessao.php`, { credentials: 'same-origin' });
      const sessao = await resp.json();

      if (sessao.logado) {
        // Mostra o nav sidebar
        document.getElementById('navSidebar').style.display = 'flex';
        // Empurra o main para dar espaço ao sidebar
        document.getElementById('mainLayout').style.marginLeft = '230px';

        if (sessao.perfil === 'admin') {
          // Exibe itens exclusivos de admin
          document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
        }
      }
    } catch { /* não logado, sem sidebar */ }
  })();

  // ── Carrega livros da API ──
  async function carregarLivros() {
    try {
      const res = await fetch(`${API_BASE}/livros_listar.php`);
      todosLivros = await res.json();
      if (!Array.isArray(todosLivros)) throw new Error('Resposta inválida');
      popularFiltros();
      aplicarFiltros();
    } catch (e) {
      grid.innerHTML = `<div style="color:rgba(255,255,255,0.3);font-size:13px;grid-column:1/-1;text-align:center;padding:60px 0;">Erro ao carregar livros. Tente recarregar a página.</div>`;
    }
  }

  // ── Popula os filtros laterais com valores reais do banco ──
  function popularFiltros() {
    const categorias = [...new Set(todosLivros.map(l => l.categoria).filter(Boolean))].sort();
    const autores    = [...new Set(todosLivros.map(l => l.autor).filter(Boolean))].sort();

    filtrosCats.innerHTML = categorias.map(c => `
      <label class="option">
        <input type="checkbox" data-filter="categoria" value="${c}"> ${c}
      </label>`).join('');

    filtrosAuts.innerHTML = autores.map(a => `
      <label class="option">
        <input type="checkbox" data-filter="autor" value="${a}"> ${a}
      </label>`).join('');

    document.querySelectorAll('input[type="checkbox"]').forEach(cb =>
      cb.addEventListener('change', () => { paginaAtual = 1; aplicarFiltros(); })
    );
  }

  // ── Aplica filtros e busca sobre todosLivros ──
  function aplicarFiltros() {
    const busca      = inputBusca.value.trim().toLowerCase();
    const categorias = getAtivos('categoria');
    const autores    = getAtivos('autor');

    livrosFiltrados = todosLivros.filter(l => {
      const passaBusca = !busca ||
        l.titulo?.toLowerCase().includes(busca) ||
        l.autor?.toLowerCase().includes(busca);
      const passaCat   = categorias.length === 0 || categorias.includes(l.categoria);
      const passaAut   = autores.length === 0    || autores.includes(l.autor);
      return passaBusca && passaCat && passaAut;
    });

    renderizar();
  }

  function getAtivos(tipo) {
    return [...document.querySelectorAll(`input[data-filter="${tipo}"]:checked`)]
      .map(cb => cb.value);
  }

  // ── Renderiza a página atual ──
  function renderizar() {
    const total  = livrosFiltrados.length;
    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const pagina = livrosFiltrados.slice(inicio, inicio + POR_PAGINA);

    countEl.textContent = total;
    emptyState.style.display = total === 0 ? 'flex' : 'none';

    grid.innerHTML = pagina.map(l => criarCardHTML(l)).join('');

    // Eventos dos botões dos cards
    grid.querySelectorAll('.btn-reserve').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const livroId = parseInt(btn.dataset.id);
        reservarLivro(livroId, btn);
      });
    });

    grid.querySelectorAll('.btn-ver-mais').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const livroId = btn.dataset.id;
        window.location.href = `TelaDoLivro.html?id=${livroId}`;
      });
    });

    grid.querySelectorAll('.book-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.id;
        window.location.href = `TelaDoLivro.html?id=${id}`;
      });
    });

    renderizarPaginacao(total);
  }

  // ── HTML de cada card ──
  function criarCardHTML(l) {
    const capa = l.capa_path
      ? `/BibliotecaSA/${l.capa_path}`
      : '../img/livro-placeholder.webp';

    const badgeClass = l.disponivel ? 'badge-disponivel' : 'badge-indisponivel';
    const badgeText  = l.disponivel ? 'Disponível' : 'Indisponível';

    return `
      <div class="book-card" data-id="${l.id}">
        <img src="${capa}" alt="${l.titulo}" onerror="this.src='../img/livro-placeholder.webp'">
        <span class="book-badge ${badgeClass}">${badgeText}</span>
        <h4>${l.titulo}</h4>
        <p>${l.autor}</p>
        <button class="btn-reserve" data-id="${l.id}" ${!l.disponivel ? 'disabled' : ''}>
          <i class="fa-solid fa-bookmark" style="margin-right:5px;"></i> Reservar
        </button>
        <button class="btn-ver-mais" data-id="${l.id}">Ver detalhes</button>
      </div>`;
  }

  // ── Paginação ──
  function renderizarPaginacao(total) {
    const totalPags = Math.ceil(total / POR_PAGINA);
    if (totalPags <= 1) { paginacao.innerHTML = ''; return; }

    let html = '';
    for (let i = 1; i <= totalPags; i++) {
      html += `<button class="page ${i === paginaAtual ? 'active' : ''}" data-p="${i}">${i}</button>`;
    }
    paginacao.innerHTML = html;

    paginacao.querySelectorAll('.page').forEach(btn => {
      btn.addEventListener('click', () => {
        paginaAtual = parseInt(btn.dataset.p);
        renderizar();
        window.scrollTo({ top: 200, behavior: 'smooth' });
      });
    });
  }

  // ── Reservar livro via API ──
  async function reservarLivro(livroId, btn) {
    const original = btn.innerHTML;
    btn.disabled  = true;
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';

    try {
      const res  = await fetch(`${API_BASE}/reserva_salvar.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ livro_id: livroId })
      });
      const data = await res.json();

      if (data.sucesso) {
        mostrarToast('Reservado!', 'Sua reserva foi registrada com sucesso.', false);
        btn.innerHTML = '<i class="fa-solid fa-check" style="margin-right:5px;"></i> Reservado';
      } else {
        mostrarToast('Atenção', data.erro || 'Erro ao reservar.', true);
        btn.disabled  = false;
        btn.innerHTML = original;
      }
    } catch {
      mostrarToast('Erro', 'Não foi possível conectar ao servidor.', true);
      btn.disabled  = false;
      btn.innerHTML = original;
    }
  }

  // ── Toast ──
  function mostrarToast(titulo, msg, erro = false) {
    clearTimeout(toastTimer);
    document.getElementById('toastTitulo').textContent = titulo;
    document.getElementById('toastMsg').textContent    = msg;
    document.getElementById('toastIconEl').className   = erro ? 'fa-solid fa-xmark' : 'fa-solid fa-check';
    toast.classList.toggle('toast-erro', erro);

    const bar = toast.querySelector('.toast-progress');
    bar.style.animation = 'none'; bar.offsetHeight; bar.style.animation = '';

    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  document.getElementById('toastClose').addEventListener('click', () => {
    toast.classList.remove('show'); clearTimeout(toastTimer);
  });

  // ── Busca com debounce ──
  inputBusca.addEventListener('input', () => {
    clearTimeout(buscaTimer);
    buscaTimer = setTimeout(() => { paginaAtual = 1; aplicarFiltros(); }, 300);
  });

  // ── Limpar filtros ──
  btnLimpar.addEventListener('click', () => {
    inputBusca.value = '';
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    paginaAtual = 1;
    aplicarFiltros();
  });

  // ── Init ──
  carregarLivros();
  </script>

</body>
</html>
