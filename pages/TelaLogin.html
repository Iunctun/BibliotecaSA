<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/navbar.css">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Syne:wght@400;700&display=swap" rel="stylesheet">
    <title>Home - Biblioteca</title>
</head>
<body>

    <div id="header"></div>
    <div class="noise"></div>

    <div class="page-layout">
    <aside class="left-panel">
        <div class="left-inner">
            <div class="logo-mark">
                <i class="fas fa-book-open"></i>
            </div>
            <h1 class="site-name">Digital<br>Library</h1>
            <p class="site-quote">"Uma biblioteca é o endereço de toda a sabedoria humana."</p>
        </div>
        <div class="ruled-lines">
            <span></span><span></span><span></span>
        </div>
    </aside>

    <main class="right-panel">
        <div class="form-wrap">

            <div class="form-header">
                <p class="eyebrow">Bem-vindo de volta</p>
                <h2 class="form-title">Entre na sua conta</h2>
            </div>

            <form id="loginForm" novalidate>

                <div class="field">
                    <label for="email">Email</label>
                    <div class="input-row">
                        <i class="fas fa-at ico"></i>
                        <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" />
                    </div>
                    <span class="err" id="emailErr"></span>
                </div>

                <div class="field">
                    <label for="senha">Senha</label>
                    <div class="input-row">
                        <i class="fas fa-lock ico"></i>
                        <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password" />
                        <button type="button" id="togglePw" aria-label="Mostrar senha">
                            <i class="fas fa-eye" id="eyeIco"></i>
                        </button>
                    </div>
                    <span class="err" id="senhaErr"></span>
                </div>

                <a href="#" class="forgot">Esqueci minha senha</a>

                <button type="submit" class="btn-submit" id="btnSubmit">
                    <span id="btnLabel">Entrar</span>
                    <i class="fas fa-circle-notch fa-spin" id="btnSpinner" style="display:none"></i>
                </button>

            </form>

            <p class="register-txt">
                Não tem conta?
                <button  id="btnCad" type="button">Criar cadastro</button>
            </p>

            <div class="toast" id="toast"></div>
        </div>
    </main>
    </div>

    <script src="../scripts/navbar.js"></script>
    <script src="../scripts/sessaolivros.js"></script>
    <script src="../scripts/include.js"></script>
    <script src="../scripts/TelaLogin.js"></script>
</body>
</html>
