<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/navbar.css">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Home - Biblioteca</title>
</head>

<body>
    <div id="header"></div>

    <section class="login-container">
        <div class="login-title">
            <h2>Digital Library</h2>
            <h3>Inicie uma viagem no mundo da leitura</h3>
        </div>
        <div class="center-input">
            <div class="input-email">
                <span class="icon-left">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7ba3f4" stroke-width="1.75"
                        stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="4" width="20" height="16" rx="2" />
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                    </svg>
                </span>
                <input class="custom-input" type="email" placeholder="Email" />
            </div>
        </div>
        <div class="center-input">
            <div class="input-senha">
                <span class="icon-left">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7ba3f4" stroke-width="1.75"
                        stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                </span>
                <input class="custom-input" type="password" placeholder="Senha" />
            </div>
        </div>
        <div class="buttons-login">
            <button class="entrar">Entrar</button>
            <button class="cadastrar">Cadastrar</button>
        </div>
    </section>


    <script src="../scripts/navbar.js"></script>
    <script src="../scripts/sessaolivros.js"></script>
    <script src="../scripts/include.js"></script>
</body>

</html>
