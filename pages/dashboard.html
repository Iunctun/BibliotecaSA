<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/navbar.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Document</title>
</head>
<body>

    <!-- Navbar fixo -->
    <div id="header"></div>

    <div class="layout">
        <aside class="sidebar">
            <a href="#" class="sidebar-item active">
                <i class="fa-solid fa-house"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="fa-solid fa-book"></i>
                <span>Gerencia Livros</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="fa-solid fa-users"></i>
                <span>Gerencia Usuarios</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="fa-solid fa-scale-balanced"></i>
                <span>Controle de Empréstimos</span>
            </a>
        </aside>
    <main class="main">
            <h1>Dashboard</h1>
        

        <div class="cards-grid">
            
            <div class="metric-card dark">
                <i class=" fa-solid fa-book-open"></i>
                <P class="card-label">Total de Livros</P>
                <p class="card-value">167</p>
            </div>

            <div class="metric-card">
                <i class=" fa-solid fa-users"></i>
                <P class="card-label">Total de Usuários</P>
                <p class="card-value">167</p>
            </div>

            <div class="metric-card dark">
                <i class=" fa-solid fa-book-bookmark"></i>
                <P class="card-label">Livros Emprestados</P>
                <p class="card-value">14</p>
            </div>

            <div class="metric-card">
                <i class=" fa-solid fa-triangle-exclamation"></i>
                <P class="card-label">Livros Atrasados</P>
                <p class="card-value">1</p>
            </div>

            </div>
        </main> 
    </div>




    <!-- JS para importar o NavBar -->
    <script src="../scripts/navbar.js"></script>
    <script src="../scripts/include.js"></script>
</body>
</html>
