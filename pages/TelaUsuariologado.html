<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../styles/TelaUsuariologado.css">
<link rel="stylesheet" href="../styles/navbar.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Dashboard Biblioteca</title>
</head>
<body>
    <div id="header"></div>

    <div class="container">
    
        <div class="card">
            <h3><i class="fas fa-id-card"></i> Dados Pessoais</h3>
            <div class="flex">
                <div class="field-group">
                    <label for="nome">Nome</label>
                    <input id="nome" class="input-field" type="text" placeholder="Digite seu nome...">
                </div>
                <div class="field-group">
                    <label for="email">Email</label>
                    <input id="email" class="input-field" type="email" placeholder="Digite seu email...">
                </div>
                <div class="field-group">
                    <label>ID de Membro</label>
                    <input class="input-field" type="text" readonly style="opacity:0.7;cursor:not-allowed;" placeholder="ID">
                </div>
            </div>
            <br>
            <button class="btn-primary" id="btnEditar">
                <i class="fas fa-user-edit"></i> Editar Perfil
            </button>
        </div>
    
        <div class="flex">
    
            <div class="card" style="flex:1">
                <h3><i class="fas fa-book"></i> Livros Atualmente Emprestados</h3>
    
                <div class="livro">
                    <div class="livro-info">
                        <img src="/img/livro1.webp" width="70" alt="Capa Livro">
                        <div class="livro-texto">
                            <strong>Diário de um Banana 1</strong>
                            <span>Jeff Kinney</span>
                        </div>
                    </div>
                    <button class="btn-primary btnRenovar">
                        <i class="fas fa-sync-alt"></i> Renovar
                    </button>
                </div>
    
                <div class="livro">
                    <div class="livro-info">
                        <img src="/img/livro2.webp" width="70" alt="Capa Livro">
                        <div class="livro-texto">
                            <strong>Diário de um Banana 2</strong>
                            <span>Jeff Kinney</span>
                        </div>
                    </div>
                    <button class="btn-primary btnRenovar">
                        <i class="fas fa-sync-alt"></i> Renovar
                    </button>
                </div>
    
                <div class="livro">
                    <div class="livro-info">
                        <img src="/img/livro3.webp" width="70" alt="Capa Livro">
                        <div class="livro-texto">
                            <strong>Diário de um Banana 3</strong>
                            <span>Jeff Kinney</span>
                        </div>
                    </div>
                    <button class="btn-primary btnReservar">
                        <i class="fas fa-bookmark"></i> Reservar
                    </button>
                </div>
            </div>
    
            <div class="card" style="flex:1">
                <h3><i class="fas fa-history"></i> Histórico de Empréstimos</h3>
    
                <div class="section">
                    <i class="fas fa-user"></i> <strong>Empréstimos de Jorginho</strong><br><br>
                    <i class="far fa-calendar-alt"></i> Emprestado em 28/01/2026
                </div>
    
                <div class="section">
                    <i class="fas fa-list-ul"></i> Reservas<br><br>
                    <button class="btn-primary btnReservar">
                        <i class="fas fa-plus"></i> Reservar Livro
                    </button>
                </div>
    
                <div class="section">
                    <i class="fas fa-trash-alt"></i> Multas 
                    <i class="fas fa-exclamation-triangle" style="color: #e74c3c;"></i>
                </div>
    
                <div class="section">
                    <strong>Valor Total:</strong> <span id="valor" class="total">R$30.00</span><br><br>
                    <button class="btn-primary" id="btnPagamento">
                        <i class="fas fa-credit-card"></i> Pagamento
                    </button>
                </div>
            </div>
    
        </div>
    </div>

<script src="../scripts/TelaUsuariologado.js"></script>
<script src="../scripts/navbar.js"></script>
<script src="../scripts/include.js"></script>
</body>
</html>
