<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/TelaUsuariologado.css">
  <link rel="stylesheet" href="../styles/navbar.css">
  <link rel="stylesheet" href="../styles/footer.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Meu Perfil - Biblioteca</title>
</head>
<body>

  <!-- ===== NAVBAR INLINE (sem include.js) ===== -->
  <header class="header">
    <div class="header-container">

      <div class="logo-left">
        <i class="fa-solid fa-book-open" style="font-size: 30px; color: #fff;"></i>
      </div>

      <nav class="nav-menu">
        <a href="../pages/TelaHome.html" class="nav-link">INÍCIO</a>
        <a href="#sessao-sobre" class="nav-link">SOBRE</a>
        <a href="../pages/TelaCatalogoLivros.html" class="nav-link">CATÁLOGO</a>
        <a href="#sessao-contato" class="nav-link">CONTATO</a>
      </nav>

      <!-- Área do usuário: começa vazia, preenchida pelo JS abaixo -->
      <div class="nav-user-area" id="navUserArea"></div>

    </div>
  </header>
  <!-- ===== FIM NAVBAR ===== -->

  <div class="container">

    <!-- Dados Pessoais -->
    <div class="card">
      <h3><i class="fas fa-id-card"></i> Dados Pessoais</h3>
      <div class="flex">
        <div class="field-group">
          <label for="nome">Nome</label>
          <input id="nome" class="input-field" type="text" readonly placeholder="Carregando...">
        </div>
        <div class="field-group">
          <label for="email">Email</label>
          <input id="email" class="input-field" type="email" readonly placeholder="Carregando...">
        </div>
        <div class="field-group">
          <label>ID de Membro</label>
          <input id="membroId" class="input-field" type="text" readonly placeholder="—">
        </div>
      </div>
      <br>
      <div class="btn-row">
        <a href="dashboard.html" class="btn-gerenciamento" id="btnGerenciamento" style="display:none">
          <i class="fas fa-sliders-h"></i> Gerenciamento da Biblioteca
        </a>
      </div>
    </div>

    <!-- Livros + Histórico -->
    <div class="flex">

      <!-- Empréstimos ativos -->
      <div class="card" style="flex:1">
        <h3><i class="fas fa-book"></i> Livros Atualmente Emprestados</h3>
        <div id="listaEmprestimos">
          <p class="lista-vazia"><i class="fas fa-circle-notch fa-spin"></i> Carregando...</p>
        </div>
      </div>

      <!-- Reservas + Multas -->
      <div class="card" style="flex:1">
        <h3><i class="fas fa-bookmark"></i> Reservas Pendentes</h3>
        <div id="listaReservas">
          <p class="lista-vazia"><i class="fas fa-circle-notch fa-spin"></i> Carregando...</p>
        </div>

        <br>
        <div class="section">
          <i class="fas fa-trash-alt"></i> Multas
          <i class="fas fa-exclamation-triangle multa-icon"></i>
        </div>

        <div class="section">
          <strong>Valor Total:</strong>
          <span id="valor" class="total">R$0.00</span>
          <br><br>
          <button class="btn-primary" id="btnPagamento">
            <i class="fas fa-credit-card"></i> Pagamento
          </button>
        </div>
      </div>

    </div>
  </div>

  <div id="footer"></div>

  <!--
    ORDEM DE SCRIPTS:
    1. navbar.js  → define initNavbar()
    2. footer.js  → carrega apenas o footer (sem mexer no header)
    3. TelaUsuariologado.js → lógica da página
    O initNavbar() é chamado diretamente, sem include.js no meio.
  -->
  <script src="../scripts/navbar.js"></script>
  <script>
    // Inicializa o navbar imediatamente (header já está no DOM)
    initNavbar();
  </script>
  <script src="../scripts/include.js"></script>
  <script src="../scripts/TelaUsuariologado.js"></script>

</body>
</html>
