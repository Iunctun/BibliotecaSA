<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Detalhes do Livro</title>
    <link rel="stylesheet" href="../styles/navbar.css">
    <link rel="stylesheet" href="../styles/footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/TelaLivro.css">
</head>

<body>

    <div id="header"></div>

    <div class="main-content">
        <div class="book-card">

            <div class="book-top-section">
                <img class="book-cover" id="livro-capa" src="" alt="Capa">

                <div class="book-info">
                    <span class="status" id="livro-status"></span>
                    <h1 id="livro-titulo"></h1>
                    <p class="author" id="livro-autor"></p>
                    <p class="pub-date" id="livro-publicacao"></p>

                    <div class="synopsis">
                        <p id="livro-resumo"></p>
                    </div>

                    <button class="btn-reserve" id="btn-alugar">Reservar</button>
                </div>
            </div>

            <div class="book-footer">
                <div class="spec-item">
                    <h3>Gênero</h3>
                    <p id="livro-genero"></p>
                </div>
                <div class="spec-item">
                    <h3>Ano de publicação</h3>
                    <p id="livro-publicacao-footer"></p>
                </div>
                <div class="spec-item">
                    <h3>Código</h3>
                    <p id="livro-id"></p>
                </div>
            </div>

        </div>
    </div>

    <!-- Modal de Aluguel -->
    <div id="modal-aluguel"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:12px; padding:2rem; max-width:420px; width:90%; position:relative;">

            <button id="modal-fechar"
                style="position:absolute; top:1rem; right:1rem; background:none; border:none; font-size:1.4rem; cursor:pointer; color:#666;">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <h2 style="margin-bottom:0.5rem;">Confirmar Reserva</h2>

            <div
                style="display:flex; gap:1rem; align-items:center; margin-bottom:1.5rem; padding:1rem; background:#f5f5f5; border-radius:8px;">
                <img id="modal-capa" src="" alt="Capa"
                    style="width:60px; height:85px; object-fit:cover; border-radius:4px;">
                <div>
                    <strong id="modal-titulo-livro"></strong>
                    <p style="margin:0.2rem 0 0; color:#666; font-size:0.9rem;" id="modal-autor-livro"></p>
                </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:1rem;">
                <div>
                    <label style="display:block; margin-bottom:0.3rem; font-weight:500;">Nome completo</label>
                    <input id="input-nome" type="text" placeholder="Seu nome completo"
                        style="width:100%; padding:0.6rem 0.8rem; border:1px solid #ccc; border-radius:6px; font-size:1rem; box-sizing:border-box;">
                </div>
                <div>
                    <label style="display:block; margin-bottom:0.3rem; font-weight:500;">CPF</label>
                    <input id="input-cpf" type="text" placeholder="000.000.000-00" maxlength="14"
                        style="width:100%; padding:0.6rem 0.8rem; border:1px solid #ccc; border-radius:6px; font-size:1rem; box-sizing:border-box;">
                </div>
                <div>
                    <label style="display:block; margin-bottom:0.3rem; font-weight:500;">Data de locação</label>
                    <input id="input-data" type="date"
                        style="width:100%; padding:0.6rem 0.8rem; border:1px solid #ccc; border-radius:6px; font-size:1rem; box-sizing:border-box;">
                </div>
            </div>

            <div style="display:flex; gap:0.8rem; margin-top:1.5rem;">
                <button id="btn-cancelar"
                    style="flex:1; padding:0.7rem; border:1px solid #ccc; border-radius:6px; background:#fff; cursor:pointer; font-size:1rem;">
                    Cancelar
                </button>
                <button id="btn-confirmar"
                    style="flex:1; padding:0.7rem; border:none; border-radius:6px; background:#2c6e49; color:#fff; cursor:pointer; font-size:1rem; font-weight:600;">
                    Confirmar
                </button>
            </div>

        </div>
    </div>

    <div id="footer"></div>

    <script src="../scripts/navbar.js"></script>
    <script src="../scripts/TelaLivro.js"></script>
    <script src="../scripts/include.js"></script>

</body>

</html>
